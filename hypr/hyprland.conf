
# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=DP-2,1920x1080@240,0x1080,1
monitor=DP-1,1920x1080@60,0x0,1
monitor=HDMI-A-1,1920x1080@60,1920x0,1,transform,1

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox

exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Some default env vars.
env = XCURSOR_SIZE,24
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = VDPAU_DRIVER,nvidia
env = SDL_VIDEODRIVER,wayland
env = GDK_BACKEND,wayland
env = GTK_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
  kb_layout = us
    kb_variant = colemak
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
      natural_scroll = no
        disable_while_typing = yes
    }

  sensitivity = -0.7 # -1.0 - 1.0, 0 means no modification.

# accel_profile custom 20.0 0.0 20.0 40.0 60.0 80.0 100.0 # "Flat" accel
    accel_profile custom 20.0 0.0 16.1 32.9 51.0 71.1 93.8

}

general {
# See https://wiki.hyprland.org/Configuring/Variables/ for more

  gaps_in = 3
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(df00b8ee) rgba(6c00dbee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

decoration {
# See https://wiki.hyprland.org/Configuring/Variables/ for more

  rounding = 8
  multisample_edges = true

    blur {

      enabled = yes
        size = 3
        passes = 3
        ignore_opacity = false
        new_optimizations = yes
        xray = false
        noise = 0.0117
        contrast = 0.8916
        brightness = 0.8172
    }

  drop_shadow = no
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
    
    screen_shader = ~/.config/hypr/screenShader.frag
}

animations {
  enabled = yes

# Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default, fade
}

dwindle {
# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
  pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
  new_is_master = true
}

gestures {
# See https://wiki.hyprland.org/Configuring/Variables/ for more
  workspace_swipe = off
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device:epic-mouse-v1 {
         sensitivity = -0.5
       }

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, alacritty
bind = $mainMod, B ,exec, firefox
bind = $mainMod, C, killactive, 
     bind = $mainMod SHIFT, Q, exit, 
     bind = $mainMod, E, exec, nemo
     bind = $mainMod, V, togglefloating, 
     bind = $mainMod, Space, exec, wofi --show drun
     bind = $mainMod, P, pseudo, # dwindle
     bind = $mainMod, J, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
     bind = $mainMod, left, movefocus, l
     bind = $mainMod, right, movefocus, r
     bind = $mainMod, up, movefocus, u
     bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
     bind = $mainMod, 1, exec, ~/.config/hypr/dispatcher.sh 1 
     bind = $mainMod, 2, exec, ~/.config/hypr/dispatcher.sh 2
     bind = $mainMod, 3, exec, ~/.config/hypr/dispatcher.sh 3
     bind = $mainMod, 4, exec, ~/.config/hypr/dispatcher.sh 4
     bind = $mainMod, 5, exec, ~/.config/hypr/dispatcher.sh 5
     bind = $mainMod, 6, exec, ~/.config/hypr/dispatcher.sh 6
     bind = $mainMod, 7, exec, ~/.config/hypr/dispatcher.sh 7
     bind = $mainMod, 8, exec, ~/.config/hypr/dispatcher.sh 8
     bind = $mainMod, 9, exec, ~/.config/hypr/dispatcher.sh 9
     bind = $mainMod, 0, exec, ~/.config/hypr/dispatcher.sh 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
     bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
     bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
     bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
     bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
     bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
     bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
     bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
     bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
     bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
     bind = $mainMod SHIFT, 0, movetoworkspace,silent 10

# Scroll through existing workspaces with mainMod + scroll
     bind = $mainMod, mouse_down, workspace, e+1
     bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
     bindm = $mainMod, mouse:272, movewindow
     bindm = $mainMod, mouse:273, resizewindow
